<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NEON SWARM — self tests</title>
  <style>
    body { background: #05060a; color: #cfeef5; font-family: ui-monospace, Menlo, monospace; padding: 24px; }
    h2 { letter-spacing: 2px; }
    .pass { color: #44ff99; }
    .fail { color: #ff3355; font-weight: bold; }
  </style>
</head>
<body>
  <h1>NEON SWARM self tests</h1>
  <div id="out">running…</div>

  <!-- hidden replica of the game HUD so hud.ts can be tested for real -->
  <div style="display:none">
    <div id="hud">
      <div class="bars">
        <div class="bar"><div class="fill" id="hp-fill"></div><div class="label" id="hp-label"></div></div>
        <div class="bar"><div class="fill" id="xp-fill"></div></div>
        <div id="level-txt"></div>
      </div>
      <div id="timer"></div>
      <div id="score"></div>
      <div id="combo" class="hidden"></div>
      <div class="stats">
        KILLS <b id="kills-txt"></b>
        SWARM <b id="enemies-txt"></b>
        FPS <b id="fps-txt"></b>
      </div>
      <div id="backend-txt"></div>
      <div id="boss-wrap" class="hidden"><div id="boss-name"></div><div id="boss-bar"><div id="boss-fill"></div></div></div>
      <div id="boss-warn" class="hidden"></div>
      <div id="toast" class="hidden"></div>
      <div id="floaters"></div>
      <div id="flash" class="hidden"></div>
      <div id="abilities">
        <div class="ab" id="ab-missile">M <b>3</b></div>
        <div class="ab" id="ab-nuke">N <b>1</b></div>
        <div class="ab" id="ab-dash">D <b>READY</b></div>
      </div>
      <div id="vignette"></div>
    </div>
    <div id="start-overlay" class="overlay">
      <button id="daily-btn" class="mode-btn daily"><span class="mode-main"></span><span class="mode-sub" id="daily-sub"></span></button>
      <button id="freeplay-btn" class="mode-btn"><span class="mode-main"></span><span class="mode-sub" id="freeplay-sub"></span></button>
      <div id="start-hint"></div>
    </div>
    <div id="levelup-overlay" class="overlay hidden"><div class="cards" id="cards"></div></div>
    <div id="touch-layer">
      <div id="tc-stick-zone"></div>
      <div id="tc-stick"><div id="tc-stick-knob"></div></div>
      <div id="tc-abilities">
        <button id="tc-dash" class="tc-btn">⟫</button>
        <button id="tc-missile" class="tc-btn">🚀<span class="tc-ct" id="tc-missile-ct"></span></button>
        <button id="tc-nuke" class="tc-btn">☢<span class="tc-ct" id="tc-nuke-ct"></span></button>
      </div>
      <button id="tc-fire" class="tc-btn tc-hidden"></button>
    </div>
    <div id="gameover-overlay" class="overlay hidden">
      <div id="brag-label"></div>
      <div id="brag-score"></div>
      <div id="brag-sub"></div>
      <div id="brag-daily" class="hidden"></div>
      <div id="go-stats"></div>
      <div id="brag-seed"></div>
      <div id="brag-global" class="hidden"></div>
      <div id="feedback-panel" class="hidden">
        <div class="fb-emoji">
          <button data-r="1"></button><button data-r="2"></button><button data-r="3"></button>
          <button data-r="4"></button><button data-r="5"></button>
        </div>
        <div class="fb-cats">
          <button data-c="bug"></button><button data-c="too_hard"></button>
          <button data-c="idea"></button><button data-c="other"></button>
        </div>
        <textarea id="fb-text"></textarea>
        <button id="fb-send"></button>
      </div>
      <button id="share-btn"></button>
      <button id="feedback-btn"></button>
      <button id="restart-btn"></button>
    </div>
    <div id="pause-overlay" class="overlay hidden"></div>
    <div id="avatar-overlay" class="overlay hidden"><div class="avatar-cards" id="avatar-cards"></div></div>
  </div>

  <script type="module" src="/src/selftest.ts"></script>
</body>
</html>
