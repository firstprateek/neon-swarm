<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEON SWARM</title>
  <style>
    :root {
      --accent: #5ef2ff;
      --accent-dim: #2a7a88;
      --danger: #ff3355;
      --xp: #44ff99;
      --panel: rgba(8, 12, 20, 0.88);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overflow: hidden; background: #05060a; }
    body { font-family: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, monospace; color: #cfeef5; }
    canvas { position: fixed; inset: 0; display: block; }

    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

    .bars { position: absolute; top: 16px; left: 16px; width: 240px; }
    .bar { height: 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(94,242,255,0.25); margin-bottom: 6px; position: relative; overflow: hidden; }
    /* bars animate via transform (compositor-only) instead of width (layout) */
    .bar .fill { height: 100%; width: 100%; transform-origin: left center; transition: transform 0.12s linear; }
    #hp-fill { background: linear-gradient(90deg, #ff3355, #ff7755); box-shadow: 0 0 8px #ff335588; }
    #xp-fill { background: linear-gradient(90deg, #22cc77, #44ff99); box-shadow: 0 0 8px #44ff9988; transform: scaleX(0); }
    .bar .label { position: absolute; right: 4px; top: -1px; font-size: 10px; color: #eaffff; text-shadow: 0 0 4px #000; }
    #level-txt { font-size: 12px; color: var(--accent); text-shadow: 0 0 6px var(--accent); }

    #timer { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); font-size: 26px; letter-spacing: 4px; color: #eaffff; text-shadow: 0 0 12px var(--accent); }

    .stats { position: absolute; top: 16px; right: 16px; text-align: right; font-size: 13px; line-height: 1.7; }
    .stats b { color: var(--accent); font-weight: 700; }
    #backend-txt { position: absolute; bottom: 10px; right: 14px; font-size: 11px; color: #4a6a78; letter-spacing: 1px; }

    #vignette { position: absolute; inset: 0; box-shadow: inset 0 0 140px 50px rgba(255, 40, 60, 0.9); opacity: 0; }

    .overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: radial-gradient(ellipse at center, rgba(5,8,14,0.55) 0%, rgba(3,4,8,0.92) 100%);
      pointer-events: auto; z-index: 20;
    }
    .overlay.hidden { display: none; }
    .title { font-size: 56px; letter-spacing: 12px; color: #eaffff; text-shadow: 0 0 24px var(--accent), 0 0 60px var(--accent); }
    .subtitle { font-size: 14px; color: #8fb8c4; letter-spacing: 3px; }
    .blink { animation: blink 1.2s infinite; font-size: 16px; color: var(--accent); letter-spacing: 4px; margin-top: 24px; }
    @keyframes blink { 50% { opacity: 0.25; } }

    .cards { display: flex; gap: 16px; }
    .card {
      width: 210px; padding: 18px 16px; background: var(--panel);
      border: 1px solid rgba(94,242,255,0.35); cursor: pointer; text-align: left;
      transition: transform 0.08s, box-shadow 0.08s, border-color 0.08s;
    }
    .card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 0 24px rgba(94,242,255,0.35); }
    .card .key { font-size: 11px; color: #4a6a78; }
    .card .name { font-size: 16px; color: var(--accent); margin: 6px 0; text-shadow: 0 0 8px rgba(94,242,255,0.6); }
    .card .desc { font-size: 12px; color: #a8ccd6; line-height: 1.5; }
    .card .stacks { font-size: 11px; color: #5f8a96; margin-top: 10px; }

    .gostats { font-size: 15px; line-height: 2.1; text-align: center; color: #a8ccd6; }
    .gostats b { color: var(--accent); }
    #restart-btn {
      margin-top: 12px; padding: 12px 38px; font-family: inherit; font-size: 16px; letter-spacing: 4px;
      background: transparent; color: var(--accent); border: 1px solid var(--accent); cursor: pointer;
    }
    #restart-btn:hover { background: rgba(94,242,255,0.12); box-shadow: 0 0 20px rgba(94,242,255,0.4); }
    .death-title { font-size: 40px; letter-spacing: 8px; color: var(--danger); text-shadow: 0 0 24px var(--danger); }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <div class="bars">
      <div class="bar"><div class="fill" id="hp-fill"></div><div class="label" id="hp-label"></div></div>
      <div class="bar"><div class="fill" id="xp-fill"></div></div>
      <div id="level-txt">LV 1</div>
    </div>
    <div id="timer">00:00</div>
    <div class="stats">
      KILLS <b id="kills-txt">0</b><br/>
      SWARM <b id="enemies-txt">0</b><br/>
      FPS <b id="fps-txt">--</b>
    </div>
    <div id="backend-txt"></div>
    <div id="vignette"></div>
  </div>

  <div id="start-overlay" class="overlay">
    <div class="title">NEON SWARM</div>
    <div class="subtitle">WASD / ARROWS TO MOVE &nbsp;·&nbsp; WEAPONS AUTO-FIRE &nbsp;·&nbsp; SURVIVE</div>
    <div class="blink">CLICK TO START</div>
  </div>

  <div id="levelup-overlay" class="overlay hidden">
    <div class="subtitle" style="font-size: 20px; color: #eaffff; text-shadow: 0 0 12px var(--accent);">LEVEL UP — CHOOSE AN UPGRADE</div>
    <div class="cards" id="cards"></div>
  </div>

  <div id="gameover-overlay" class="overlay hidden">
    <div class="death-title">CONSUMED</div>
    <div class="gostats" id="go-stats"></div>
    <button id="restart-btn">RESTART</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
